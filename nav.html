<!DOCTYPE html>
<html>
<head>
<title>Menu with Icons</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<style>

nav{
    background-image: linear-gradient(to right,darkblue,lightblue);
    padding:15px;
    /* text-align: center; */
}

ul{
    list-style:none;
    margin:0;
    padding:0;
}

li{
    display:inline;
    margin-right:30px;
}

a{
    color:white;
    text-decoration:none;
    font-size:20px;
    cursor: pointer;
}

a:hover{
    color:yellow;
}

button{
    background-image: linear-gradient(to left,white ,yellow);
    color: rgb(44, 42, 165);
    text-align: center;
    padding: 10px;
    border-radius: 10%;
    cursor: pointer;
     position: fixed;   
    bottom: 50%;      
    right: 50%;   

}
button:hover{
    color: black
}

</style>

</head>

<body>

<nav>
<ul>
<li><a href="#"><i class="fa fa-home"></i> Home</a></li>
<li><a href="#"><i class="fa-solid fa-address-book"></i> About</a></li>
<li><a href="#"><i class="fa-solid fa-phone"></i> Contact</a></li>
</ul>
</nav>
<br>

<button>Search<i class="fa-solid fa-magnifying-glass fa-s" ></i></button>

</body>
</html>
