<!DOCTYPE html>
<html>
<head>
<title>Table Layout</title>

<style>
table{
    width:800px;
    border-collapse:collapse;
    text-align:center;
    font-weight:bold;
}

td{
    border:2px solid black;
    padding:20px;
}
</style>

</head>

<body>

<table>

<tr>
<td>A</td>
<td colspan="2">B</td>
<!-- <td>C</td> -->
<td >D</td>
</tr>

<tr>
<td>F</td>
<td rowspan="2">E</td>
<td colspan="2"> G</td>
<!-- <td >H</td> -->
</tr>

<tr>

<!-- <td >I</td> -->
<td rowspan="2">J</td>
<td>K</td>
<td>L</td>
</tr>

<tr>

<!-- <td >M</td> -->
<td>N</td>
<td colspan="2">O</td>
<!-- <td>P</td> -->


</tr>

</table>

</body>
</html>
